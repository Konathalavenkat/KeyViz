<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeyViz</title>
  <style>
    :root {
      --primary: #3b82f6;
      --primary-hover: #60a5fa;
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.2), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      padding: 20px;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
    }

    .header-text h1 {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 13px;
      color: var(--text-muted);
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .toggle-label { font-size: 15px; font-weight: 600; }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: #cbd5e1;
      border-radius: 99px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .toggle-switch.active { background: var(--primary); }

    .toggle-slider {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s ease;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }

    .toggle-switch.active .toggle-slider { transform: translateX(20px); }

    .status-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      background: #f1f5f9;
      color: var(--text-muted);
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-badge.enabled { background: #dcfce7; color: #166534; }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .tip-item {
      display: flex;
      gap: 10px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
      align-items: flex-start;
    }

    .tip-item:last-child { margin-bottom: 0; }

    .tip-icon { color: var(--primary); font-weight: bold; }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.png" class="header-icon" alt="KeyViz Icon">
    <div class="header-text">
      <h1>KeyViz</h1>
      <p>Pro Visualization</p>
    </div>
  </div>

  <div class="card">
    <div class="toggle-row">
      <span class="toggle-label">Real-time Display</span>
      <div class="toggle-switch" id="toggleSwitch">
        <div class="toggle-slider"></div>
      </div>
    </div>
    <div class="status-badge" id="status">Disabled</div>
  </div>

  <div class="section-title">Quick Tips</div>
  <div class="card">
    <div class="tip-item">
      <span class="tip-icon">✓</span>
      <span>Works on all regular websites.</span>
    </div>
    <div class="tip-item">
      <span class="tip-icon">✓</span>
      <span>Modifier keys (Ctrl, Alt, etc.) supported.</span>
    </div>
    <div class="tip-item">
      <span class="tip-icon">✓</span>
      <span>Privacy first: No data leaves your device.</span>
    </div>
  </div>

  <div class="footer">
    <span>v1.0.0</span>
    <div>
      <a href="https://github.com/Konathalavenkat/KeyViz/issues" target="_blank">Support</a> • <a href="https://github.com/Konathalavenkat/KeyViz" target="_blank">GitHub</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
